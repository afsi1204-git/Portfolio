<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Afsheen Fathima Akbar Ali — Computer Science Engineer portfolio. Web developer, React enthusiast, and student at Kongu Engineering College."
    />
    <meta name="author" content="Afsheen Fathima Akbar Ali" />
    <title>Afsheen Fathima | Portfolio</title>
    
    <!-- Splash Screen Minimal Styling -->
    <style>
      body {
        margin: 0;
        padding: 0;
        background-color: #0f172a; /* Dark sleek background slate-900 */
        font-family: system-ui, -apple-system, sans-serif;
      }
      .splash-container {
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        height: 100vh;
        width: 100vw;
        color: #f8fafc;
      }
      .splash-logo {
        font-size: 2.5rem;
        font-weight: 700;
        letter-spacing: -0.05em;
        margin-bottom: 1.5rem;
        opacity: 0;
        animation: fadeIn 1s ease-out forwards;
      }
      .splash-logo span {
        color: #38bdf8; /* React / Dev inspired sky blue tint */
      }
      .spinner {
        width: 40px;
        height: 40px;
        border: 3px solid rgba(56, 189, 248, 0.1);
        border-radius: 50%;
        border-top-color: #38bdf8;
        animation: spin 0.8s linear infinite;
      }
      @keyframes fadeIn {
        from { opacity: 0; transform: translateY(10px); }
        to { opacity: 1; transform: translateY(0); }
      }
      @keyframes spin {
        to { transform: rotate(360deg); }
      }
    </style>
  </head>
  <body>
    <div id="root">
      <!-- Everything inside here shows instantly and vanishes automatically once React mounts -->
      <div class="splash-container">
        <div class="splash-logo">AF<span>.</span></div>
        <div class="spinner"></div>
      </div>
    </div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
